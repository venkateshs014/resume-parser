databases:
  - name: resume-parser-db
    plan: free
    region: singapore
    databaseName: resume_parser
    user: resume_parser

services:
  - name: resume-parser-redis
    type: keyvalue
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/32
        description: block external access

  - name: resume-parser-backend
    type: web
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-parser-db
          property: connectionString
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: resume-parser-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: resume-parser-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: resume-parser-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: resume-parser-redis
          type: keyvalue
          property: connectionString

  - name: resume-parser-worker
    type: worker
    runtime: python
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-parser-db
          property: connectionString
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: resume-parser-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: resume-parser-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: resume-parser-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: resume-parser-redis
          type: keyvalue
          property: connectionString

  - name: resume-parser-frontend
    type: web
    runtime: node
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: BACKEND_PRIVATE_HOSTPORT
        fromService:
          name: resume-parser-backend
          type: web
          property: hostport
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api
